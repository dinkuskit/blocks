name: ClawSweeper comment trigger

on:
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: blocks-clawsweeper-comment-${{ github.event.repository.id }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  admit:
    name: Admit exact review command
    if: >-
      github.event.repository.full_name == 'dinkuskit/blocks' &&
      github.event.repository.id == 1306882611 &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@clawsweeper')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      requested: ${{ steps.admission.outputs.requested }}
      pr_number: ${{ steps.admission.outputs.pr_number }}
      base_sha: ${{ steps.admission.outputs.base_sha }}
      head_sha: ${{ steps.admission.outputs.head_sha }}
    steps:
      - name: Check out the trusted default-branch admission policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false
          sparse-checkout: scripts/clawsweeper-comment-admission.mjs
          sparse-checkout-cone-mode: false

      - name: Bind the authorized command to the live pull request tuple
        id: admission
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/clawsweeper-comment-admission.mjs

  review:
    name: Run pinned native ClawSweeper
    needs: admit
    if: needs.admit.outputs.requested == 'true'
    permissions:
      actions: read
      contents: read
    uses: dinkuskit/clawsweeper/.github/workflows/dinkuskit-native-canary.yml@84650c06549cab4b335e3f06b7341f078a324785
    with:
      target_repository: blocks
      target_repository_id: "1306882611"
      pr_number: ${{ needs.admit.outputs.pr_number }}
      expected_base_sha: ${{ needs.admit.outputs.base_sha }}
      expected_head_sha: ${{ needs.admit.outputs.head_sha }}
      engine_sha: 84650c06549cab4b335e3f06b7341f078a324785
      publish: true
    secrets:
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
