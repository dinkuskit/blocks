name: ClawSweeper App permission probe

on:
  pull_request:
    paths:
      - .github/workflows/clawsweeper-app-permission-probe.yml

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mint PR-write App token
        id: pr_write
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CLAWSWEEPER_APP_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-pull-requests: write

      - name: Probe PR-write comment creation without mutation
        env:
          APP_TOKEN: ${{ steps.pr_write.outputs.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['APP_TOKEN']}",
              "Content-Type": "application/json",
              "User-Agent": "dinkuskit-clawsweeper-permission-probe",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request(method, url, body=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              probe = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(probe, timeout=20) as response:
                      return response.status, response.headers
              except urllib.error.HTTPError as error:
                  return error.code, error.headers

          api_root = "https://api.github.com/repos/dinkuskit/blocks"
          read_status, _ = request("GET", f"{api_root}/issues/comments/5041450260")
          create_status, create_headers = request(
              "POST",
              f"{api_root}/issues/7/comments",
              {},
          )
          accepted = create_headers.get("x-accepted-github-permissions", "missing")
          print(f"pr_write_read_status={read_status}")
          print(f"pr_write_invalid_comment_status={create_status}")
          print(f"pr_write_accepted_permissions={accepted}")
          if read_status != 200:
              raise SystemExit("PR-write token cannot read the fixed probe comment")
          if create_status != 422:
              raise SystemExit(
                  "PR-write token did not reach non-mutating comment validation"
              )
          PY
