name: ClawSweeper command

# Thin caller for each public DinkusKit product repo.
# Calls the reviewed reusable workflow by immutable full commit SHA.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  review:
    uses: dinkuskit/.github/.github/workflows/clawsweeper-command.yml@dc08a5dde46bd1f63d789228d0c64bbe8ce1f561
    with:
      clawsweeper_app_id: ${{ vars.CLAWSWEEPER_APP_ID }}
      clawsweeper_app_bot_login: ${{ vars.CLAWSWEEPER_APP_BOT_LOGIN }}
    secrets:
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
