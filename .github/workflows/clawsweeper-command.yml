name: ClawSweeper command

# Thin caller for each public DinkusKit product repo.
# Requires dinkuskit/.github reusable workflow on main (path B).
# Copy to: .github/workflows/clawsweeper-command.yml

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  review:
    uses: dinkuskit/.github/.github/workflows/clawsweeper-command.yml@main
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
