name: ClawSweeper native canary

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number (the first canary is restricted to #7)
        required: true
        type: string
        default: "7"
      expected_base_sha:
        description: Exact current main SHA to review against
        required: true
        type: string
      expected_head_sha:
        description: Exact pull request head SHA to review
        required: true
        type: string
      publish:
        description: Publish the native comment, labels, and durable state record
        required: true
        type: boolean
        default: false

permissions: {}

jobs:
  clawsweeper:
    name: Run pinned native ClawSweeper
    permissions:
      actions: read
      contents: read
    uses: dinkuskit/clawsweeper/.github/workflows/dinkuskit-native-canary.yml@eaa65c01229f2a1920b2c5d6efece63e0dc8a0a7
    with:
      pr_number: ${{ inputs.pr_number }}
      expected_base_sha: ${{ inputs.expected_base_sha }}
      expected_head_sha: ${{ inputs.expected_head_sha }}
      publish: ${{ inputs.publish }}
    secrets:
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
